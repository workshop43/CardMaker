<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公众号排版示例</title>
  <link rel="stylesheet" href="../cardmaker.css" />
</head>
<body>
  <!-- 公众号图文示例：生成后点击「复制公众号 HTML」，粘贴到公众号编辑器。 -->
  <div data-cardmaker data-preset="story" data-title="公众号排版示例" data-font="hei">
    <style>
      .wechat-demo .cm-main { display: block; }
      .wechat-demo .cm-main > * { margin: 0; }
      .wechat-demo .cm-main > * + * { margin-top: 18px; }
      .wechat-demo .mp-lead { font-size: 17px; line-height: 1.85; color: var(--cm-muted); margin: 0; }
      .wechat-demo .mp-section { padding: 16px; border: 1px solid var(--cm-line); border-radius: 12px; }
      .wechat-demo .mp-section h2 { font-size: 20px; line-height: 1.4; margin: 0 0 8px; color: var(--cm-fg); }
      .wechat-demo .mp-section p { font-size: 16px; line-height: 1.85; color: var(--cm-muted); margin: 0; }
      .wechat-demo .mp-quote { border-left: 4px solid var(--cm-accent); padding: 10px 0 10px 14px; color: var(--cm-fg); font-size: 16px; line-height: 1.75; }
      .wechat-demo .mp-note { color: var(--cm-muted); font-size: 14px; line-height: 1.7; margin: 0; }
    </style>

    <section class="card wechat-demo" data-theme="light" data-role="content">
      <div class="cm-main">
        <p class="mp-lead">用清晰的层级、舒服的段落和重点模块，把内容整理成公众号编辑器可识别的 HTML。</p>
        <div class="mp-quote">生成完成后点击「复制公众号 HTML」，粘贴到公众号后台即可保留基础格式。</div>
        <div class="mp-section">
          <h2>1. 标题要短，导语要清楚</h2>
          <p>公众号读者先扫结构，再决定是否继续读。主标题、导语和小标题要承担导航作用。</p>
        </div>
        <div class="mp-section">
          <h2>2. 重点内容做成模块</h2>
          <p>用浅底色、引用、重点卡片承载结论，避免一整屏都是等权重段落。</p>
        </div>
        <div class="mp-section">
          <h2>3. 复制 HTML 后再微调</h2>
          <p>粘贴到公众号后台后，可以继续在编辑器里调整局部文字和图片。</p>
        </div>
        <p class="mp-note">这不是分页卡片，而是一篇长页面。预览时按宽度缩放，纵向滚动查看全文。</p>
      </div>
    </section>
  </div>
  <script type="module" src="../app/main.js"></script>
</body>
</html>

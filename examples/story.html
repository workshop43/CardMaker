<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我们在找你（竖屏示例）</title>
  <link rel="stylesheet" href="../cardmaker.css" />
</head>
<body>
  <!-- 竖屏 9:16 示例：招聘海报。整套同一主题 gradient，全局得意黑标题字。 -->
  <div data-cardmaker data-preset="story" data-title="我们在找你" data-font="smiley">

    <!-- 封面：大标题 + 标签 -->
    <section class="card cm-middle" data-theme="gradient" data-font="smiley">
      <div class="cm-kicker">招聘海报</div>
      <h1 class="cm-display">我们<br>在找你</h1>
      <p class="cm-lead cm-mt">前端工程师 · 远程优先 · 弹性工作。</p>
      <div class="cm-mt-lg"><span class="cm-tag">投递 → hi@cardmaker.dev</span></div>
      <div class="cm-footer"><span>@CardMaker</span><span>扫码了解 ↓</span></div>
    </section>

    <!-- 信息页：岗位亮点 -->
    <section class="card" data-theme="gradient" data-font="smiley">
      <div class="cm-header"><span>JOIN US</span><span>Frontend Engineer</span></div>
      <div class="cm-main">
        <div class="cm-kicker">你将拥有</div>
        <h2>把产品做给真实用户</h2>
        <p class="cm-lead">我们需要能把复杂交互做得清楚、稳定、好用的人。</p>
        <div class="cm-col cm-mt" style="gap: 22px;">
          <div class="cm-cell">
            <h3>有意思的活</h3>
            <p>从编辑器、导出链路到 AI 工作流，参与核心体验设计。</p>
          </div>
          <div class="cm-cell">
            <h3>说人话的团队</h3>
            <p>少开会，重交付，讨论问题直接看 demo 和数据。</p>
          </div>
          <div class="cm-cell">
            <h3>能成长的环境</h3>
            <p>学习预算、设备预算和充分的技术 ownership。</p>
          </div>
        </div>
      </div>
      <div class="cm-footer"><span>hi@cardmaker.dev</span><span>← 滑动 →</span></div>
    </section>

  </div>
  <script type="module" src="../app/main.js"></script>
</body>
</html>

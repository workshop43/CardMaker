name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # CardMaker 零构建：静态文件就在根目录，只把运行时需要的拷进 dist/，
      # 避免把 .git/.github/README 等传到 Pages。
      - name: Assemble static site
        run: |
          mkdir -p dist/examples
          cp index.html cardmaker.css cardmaker.js cardmaker-ai.js cardmaker.config.js dist/
          cp examples/*.html dist/examples/

      - name: Create Pages project (idempotent) & deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # 首次部署前确保项目存在；已存在则忽略报错（幂等）
          npx -y wrangler@latest pages project create cardmaker --production-branch=main || echo "项目已存在，跳过创建"
          npx -y wrangler@latest pages deploy dist --project-name=cardmaker --branch=main --commit-dirty=true
